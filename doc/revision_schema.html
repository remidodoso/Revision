<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Revision — Schema</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, sans-serif;
    max-width: 72rem;
    margin: 2rem auto;
    padding: 0 1rem;
    line-height: 1.45;
  }
  h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
  h2 { font-size: 1.15rem; margin-top: 2.5rem; border-bottom: 2px solid currentColor; padding-bottom: 0.25rem; }
  h3 { font-size: 1rem; font-family: ui-monospace, monospace; margin-bottom: 0.2rem; }
  .meta, .note { color: color-mix(in srgb, currentColor 65%, transparent); }
  .meta { font-size: 0.85rem; }
  .note { margin: 0.2rem 0 0.6rem; max-width: 60rem; }
  .group-note { margin-bottom: 1rem; }
  nav { margin: 1rem 0 2rem; font-size: 0.9rem; }
  nav a { margin-right: 0.75rem; white-space: nowrap; }
  .object { margin: 1.5rem 0 2rem; }
  .kind {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em;
    border: 1px solid currentColor; border-radius: 0.2rem; padding: 0 0.3rem;
    opacity: 0.65; margin-left: 0.4rem; vertical-align: 0.15em;
  }
  .scroll { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; font-size: 0.9rem; }
  th, td { text-align: left; padding: 0.3rem 0.6rem; vertical-align: top; }
  th { border-bottom: 1px solid currentColor; font-weight: 600; }
  tr + tr td { border-top: 1px solid color-mix(in srgb, currentColor 15%, transparent); }
  td.name { font-family: ui-monospace, monospace; white-space: nowrap; }
  td.type { font-family: ui-monospace, monospace; white-space: nowrap; opacity: 0.75; font-size: 0.85em; }
  td.flag { white-space: nowrap; font-size: 0.8em; opacity: 0.8; }
  .pk { font-weight: 700; }
  .extra { font-size: 0.85rem; margin-top: 0.5rem; }
  .extra b { font-weight: 600; }
  code, pre { font-family: ui-monospace, monospace; }
  pre {
    font-size: 0.8rem; padding: 0.75rem; overflow-x: auto;
    background: color-mix(in srgb, currentColor 7%, transparent); border-radius: 0.3rem;
  }
  a { color: inherit; }
</style>
</head>
<body>
<h1>Revision — Schema</h1>
<p class="meta" id="meta_line">loading…</p>
<nav id="nav"></nav>
<div id="body"></div>

<script>
  // The document is generated by `cargo xtask schema` from a live database plus
  // the annotations in schema.sql; this only renders it.
  const el = (tag, className, text) => {
    const node = document.createElement(tag);
    if (className) node.className = className;
    if (text != null) node.textContent = text;
    return node;
  };

  // Foreign keys become links, because this schema is relational enough that
  // following one by clicking beats reading it.
  const link_to = (name, label) => {
    const a = el("a", null, label ?? name);
    a.href = `#${name}`;
    return a;
  };

  function render_column(object) {
    const table = el("table");
    const head = table.createTHead().insertRow();
    for (const label of ["Column", "Type", "", "Description"]) {
      head.appendChild(el("th", null, label));
    }
    const body = table.createTBody();
    const fk_by_column = new Map(object.foreign_key.map((f) => [f.column, f]));
    for (const column of object.column) {
      const row = body.insertRow();
      const name_cell = row.insertCell();
      name_cell.className = "name" + (column.primary_key ? " pk" : "");
      name_cell.textContent = column.name;
      row.insertCell().outerHTML = `<td class="type">${column.type || "—"}</td>`;

      const flag = [];
      if (column.primary_key) flag.push("PK");
      if (column.not_null) flag.push("NOT NULL");
      if (column.default != null) flag.push(`= ${column.default}`);
      const flag_cell = row.insertCell();
      flag_cell.className = "flag";
      flag_cell.textContent = flag.join(" · ");

      const note_cell = row.insertCell();
      const reference = fk_by_column.get(column.name);
      if (reference) {
        note_cell.append("→ ", link_to(reference.table, `${reference.table}.${reference.to}`));
        if (column.note) note_cell.append(" — " + column.note);
      } else {
        note_cell.textContent = column.note || "";
      }
    }
    const wrap = el("div", "scroll");
    wrap.appendChild(table);
    return wrap;
  }

  // One ER diagram per group, from the foreign-key list. Mermaid renders
  // natively here, so the diagram costs a code fence rather than a library.
  function render_diagram(group) {
    const inside = new Set(group.object.map((o) => o.name));
    const edge = [];
    for (const object of group.object) {
      for (const reference of object.foreign_key) {
        const shape = reference.table === object.name ? "||--o{" : "||--o{";
        edge.push(`  ${reference.table} ${shape} ${object.name} : ${reference.column}`);
      }
    }
    if (!edge.length) return null;
    const node = [...inside].map((n) => `  ${n} {\n  }`).join("\n");
    const pre = el("pre", "mermaid");
    pre.textContent = `erDiagram\n${node}\n${edge.join("\n")}`;
    return pre;
  }

  fetch("revision_schema.json")
    .then((response) => response.json())
    .then((schema) => {
      document.getElementById("meta_line").textContent =
        `generated by ${schema.meta.generator} from ${schema.meta.source} — schema version ${schema.meta.schema_version}`;

      const nav = document.getElementById("nav");
      const body = document.getElementById("body");

      for (const group of schema.group) {
        const heading = el("h2", null, group.name);
        heading.id = group.name.replace(/\W+/g, "_");
        body.appendChild(heading);
        nav.appendChild(link_to(heading.id, group.name));
        if (group.note) body.appendChild(el("p", "note group-note", group.note));

        const diagram = render_diagram(group);
        if (diagram) body.appendChild(diagram);

        for (const object of group.object) {
          const section = el("div", "object");
          section.id = object.name;
          const title = el("h3", null, object.name);
          title.appendChild(el("span", "kind", object.kind));
          section.appendChild(title);
          if (object.note) section.appendChild(el("p", "note", object.note));
          section.appendChild(render_column(object));

          const declared = object.index.filter((i) => i.declared);
          if (declared.length) {
            const line = el("p", "extra");
            line.appendChild(el("b", null, "Indexes: "));
            line.append(
              declared
                .map((i) => `${i.name} (${i.column.join(", ")})${i.partial ? " partial" : ""}`)
                .join(" · ")
            );
            section.appendChild(line);
          }

          if (object.sql) {
            const label = el("p", "extra");
            label.appendChild(el("b", null, "Definition"));
            section.appendChild(label);
            section.appendChild(el("pre", null, object.sql));
          }
          body.appendChild(section);
        }
      }
    })
    .catch((error) => {
      document.getElementById("meta_line").textContent =
        `failed to load revision_schema.json: ${error}`;
    });
</script>
</body>
</html>
