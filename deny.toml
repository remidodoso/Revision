# cargo-deny configuration — enforces the GPL-free dependency standard
# (revision_coding_standard.md, "Dependencies & licensing").
# Anything not on the allowlist fails CI; additions arrive with their
# dependency's checkpoint, never silently.

[licenses]
# Explicit denial, not mere omission: BSD-4-Clause's advertising clause is the one
# trap in the permissive family, and denying it by name records that we looked.
deny = ["BSD-4-Clause", "BSD-4-Clause-UC"]

# Where a dependency offers a choice, the arm adopted is recorded, not inferred
# (coding standard, "Dependencies & licensing"):
#   self_cell  "Apache-2.0 OR GPL-2.0-only"  -> Apache-2.0 adopted, GPL declined.
#   rtrb       "MIT OR Apache-2.0"           -> Apache-2.0 adopted.
#   cpal       "Apache-2.0"                  -> no choice offered.
# In an SPDX expression OR is a choice and AND is not; both arms of an AND apply.
#
# Bundled assets (fonts, icons) are not crates and are invisible here: they are
# declared in the asset manifest and audited by `cargo xtask license` (R-1514).
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "0BSD",
  "Unicode-3.0",
  "OFL-1.1",
  "CC0-1.0",
]
